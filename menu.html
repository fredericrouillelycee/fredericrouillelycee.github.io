<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Présentation IA Interactive</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            width: 100%;
            height: 100vh;
            overflow: hidden;
            background: #000;
            font-family: Arial, sans-serif;
        }
        .image-map-container {
            width: 100vw;
            height: 100vh;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #111;
        }
        .presentation-image {
            max-width: 95vw;
            max-height: 95vh;
            width: auto;
            height: auto;
            object-fit: contain;
            cursor: pointer;
            transition: transform 0.3s ease;
        }
        .presentation-image:hover {
            transform: scale(1.02);
        }
        .slide-link {
            position: absolute;
            cursor: pointer;
            border: 3px solid rgba(0,123,255,0.3);
            transition: all 0.3s ease;
        }
        .slide-link:hover {
            border-color: #007bff;
            background: rgba(0,123,255,0.1);
            transform: scale(1.05);
        }
        .slide-label {
            position: absolute;
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 14px;
            white-space: nowrap;
            pointer-events: none;
        }
        .nav-buttons {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
        }
        button {
            background: #007bff;
            color: white;
            border: none;
            padding: 12px 24px;
            margin: 0 10px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: background 0.3s;
        }
        button:hover {
            background: #0056b3;
        }
        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255,255,255,0.2);
            color: white;
            border: 1px solid rgba(255,255,255,0.3);
        }
        .fullscreen-btn:hover {
            background: rgba(255,255,255,0.3);
        }
    </style>
</head>
<body>
    <div class="image-map-container">
        <!-- Grande image de la présentation (remplace par ton image) -->
        <img src="index-presentation.jpg" alt="Présentation IA" class="presentation-image" 
             usemap="#presentation-map">

        <!-- Zones cliquables correspondant aux slides -->
        <map name="presentation-map">
            <!-- Slide 1: Les objets (gauche haut) -->
            <area shape="rect" coords="50,50,450,350" href="#slide1" alt="Les objets" 
                  title="Les objets - Picture 5 & 6">
            
            <!-- Slide 2: La numérisation (milieu haut) -->
            <area shape="rect" coords="500,50,900,350" href="#slide2" alt="La numérisation"
                  title="La numérisation - Picture 9,10,11">
            
            <!-- Slide 3: Activités IA (droite haut) -->
            <area shape="rect" coords="950,50,1400,350" href="#slide3" alt="Activités IA"
                  title="Activités autour de l'IA">
            
            <!-- Slide 4: Les formes (gauche milieu) -->
            <area shape="rect" coords="50,400,450,700" href="#slide4" alt="Les formes"
                  title="Les formes - Picture 3 & 4">
            
            <!-- Slide 5: La modération (milieu bas) -->
            <area shape="rect" coords="500,400,900,700" href="#slide5" alt="La modération"
                  title="La modération - Picture 7 & 8">
            
            <!-- Slide 6: Le prompt (droite bas) -->
            <area shape="rect" coords="950,400,1400,700" href="#slide6" alt="Le prompt"
                  title="Le prompt - Picture 12 & 13">
        </map>

        <!-- Labels flottants -->
        <div class="slide-label" style="top: 120px; left: 150px;">Les objets</div>
        <div class="slide-label" style="top: 120px; left: 650px;">Numérisation</div>
        <div class="slide-label" style="top: 120px; left: 1100px;">Activités IA</div>
        <div class="slide-label" style="top: 500px; left: 150px;">Les formes</div>
        <div class="slide-label" style="top: 500px; left: 650px;">Modération</div>
        <div class="slide-label" style="top: 500px; left: 1100px;">Le prompt</div>
    </div>

    <!-- Navigation -->
    <div class="nav-buttons">
        <button onclick="zoomIn()">🔍 Zoom +</button>
        <button onclick="zoomOut()">🔍 Zoom -</button>
        <button onclick="toggleFullscreen()">⛶ Plein écran</button>
    </div>

    <script>
        let scale = 1;
        
        function zoomIn() {
            scale += 0.1;
            scale = Math.min(scale, 2);
            updateZoom();
        }
        
        function zoomOut() {
            scale -= 0.1;
            scale = Math.max(scale, 0.5);
            updateZoom();
        }
        
        function updateZoom() {
            document.querySelector('.presentation-image').style.transform = `scale(${scale})`;
        }
        
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }
        
        // Navigation clavier
        document.addEventListener('keydown', (e) => {
            switch(e.key) {
                case '+': case '=': zoomIn(); break;
                case '-': zoomOut(); break;
                case 'F': case 'f': toggleFullscreen(); break;
            }
        });
        
        // Clic sur les zones pour afficher info
        document.querySelectorAll('area').forEach(area => {
            area.addEventListener('click', (e) => {
                e.preventDefault();
                const title = area.getAttribute('title');
                alert(`Slide sélectionnée: ${title}\n\nCliquez sur "OK" pour continuer`);
            });
        });
    </script>
</body>
</html>
